identity:
  name: extractor2md
  author: neyara11
  label:
    en_US: Extractor2md
    zh_Hans: Extractor2md文本提取器
    pt_BR: Extractor2md
description:
  human:
    en_US: Extractor2md — extract text and structure from files into Markdown
    zh_Hans: Extractor2md — 从文件中提取文本和结构为 Markdown
    pt_BR: Extractor2md — extraia texto e estrutura de arquivos para Markdown
  llm: Extractor2md — extract text and structure from files into Markdown
parameters:
  - name: file
    type: file
    required: true
    label:
      en_US: file
      zh_Hans: file
      pt_BR: file
    human_description:
      en_US:  the file to be parsed (support pdf, xls, xlsx, md, markdown, mdx, htm, html, pptx, docx, csv, json, yaml, yml)
      zh_Hans: 用于解析的文件 (支持 pdf, xls, xlsx, md, markdown, mdx, htm, html, pptx, docx, csv, json, yaml, yml)
      pt_BR:  o arquivo a ser analisado (suporta pdf, xls, xlsx, md, markdown, mdx, htm, html, pptx, docx, csv, json, yaml, yml)
    llm_description: the file to be parsed (support pdf, xls, xlsx, md, markdown, mdx, htm, html, pptx, docx, csv, json, yaml, yml)
    form: llm
output_schema:
    type: object
    properties:
      documents:
        type: array
        items:
          type: object
        description: the documents extracted from the file
      images:
        type: array
        items:
          type: file
        description: The images extracted from the file (as file references)
      files:
        type: array
        items:
          type: file
        description: The files extracted from the document (for LLM vision input)
extra:
  python:
    source: tools/extractor2md.py
